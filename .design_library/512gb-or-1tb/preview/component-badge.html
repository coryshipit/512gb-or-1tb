<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Badge Component</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
/* Page scaffold — NOT extracted */
body { margin: 0; padding: var(--space-md); background: var(--color-bg-base); font-family: var(--font-sans); color: var(--color-text-primary); }
.page-title { font-size: var(--font-size-h2); font-weight: var(--font-weight-h2); line-height: var(--line-height-h2); margin: 0 0 var(--space-lg) 0; color: var(--color-text-primary); }
.compare-row { display: flex; gap: var(--space-lg); align-items: flex-start; flex-wrap: wrap; }
.badge-cell { display: flex; flex-direction: column; align-items: flex-start; gap: var(--space-sm); }
.range { font-size: var(--font-size-caption); font-weight: var(--font-weight-caption); color: var(--color-text-tertiary); white-space: nowrap; }

/* @component-css-start */
/* Component definitions — extracted to components.css by deterministic script */
.storage-badge { display: inline-flex; align-items: center; padding: 2px 10px; min-width: 28px; font-family: var(--font-sans); font-size: 0.75rem; font-weight: 600; line-height: 1.4; border-radius: var(--radius-full); white-space: nowrap; }
.storage-badge-critical { background-color: var(--color-state-critical-bg); color: var(--color-state-critical); }
.storage-badge-manageable { background-color: var(--color-state-manageable-bg); color: var(--color-state-manageable); }
.storage-badge-comfortable { background-color: var(--color-state-comfortable-bg); color: var(--color-state-comfortable); }
.storage-badge-abundant { background-color: var(--color-state-abundant-bg); color: var(--color-state-abundant); }
/* @component-css-end */
</style>
</head>
<body>
<h1 class="page-title">Badge Component</h1>
<div class="compare-row">
  <div class="badge-cell" data-evidence-sample="critical">
    <span class="storage-badge storage-badge-critical">紧张</span>
    <span class="range">剩余 &lt; 10%</span>
  </div>
  <div class="badge-cell" data-evidence-sample="manageable">
    <span class="storage-badge storage-badge-manageable">可用但需管理</span>
    <span class="range">剩余 10%–20%</span>
  </div>
  <div class="badge-cell" data-evidence-sample="comfortable">
    <span class="storage-badge storage-badge-comfortable">舒适</span>
    <span class="range">剩余 20%–40%</span>
  </div>
  <div class="badge-cell" data-evidence-sample="abundant">
    <span class="storage-badge storage-badge-abundant">充裕</span>
    <span class="range">剩余 &gt; 40%</span>
  </div>
</div>
</body>
</html>
