<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tag Component</title>
<link rel="stylesheet" href="../colors_and_type.css">
<script src="https://unpkg.com/lucide@1.8.0/dist/umd/lucide.min.js"></script>
<style>
/* Page scaffold — NOT extracted */
body { margin: 0; padding: var(--space-md); background: var(--color-bg-base); font-family: var(--font-sans); color: var(--color-text-primary); }
.page-title { font-size: var(--font-size-h2); font-weight: var(--font-weight-h2); line-height: var(--line-height-h2); margin: 0 0 var(--space-md) 0; color: var(--color-text-primary); }
.section { margin-bottom: var(--space-md); }
.section-label { display: block; font-size: var(--font-size-caption); font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; color: var(--color-text-tertiary); margin-bottom: var(--space-sm); }
.row { display: flex; gap: var(--space-sm); align-items: center; flex-wrap: wrap; }
.divider { height: 1px; background: var(--color-border); border: none; margin: var(--space-md) 0; }

/* @component-css-start */
/* Component definitions — extracted to components.css by deterministic script */
.storage-tag { display: inline-flex; align-items: center; gap: 4px; padding: 2px 10px; min-width: 28px; font-family: var(--font-mono); font-size: 0.75rem; font-weight: 500; line-height: 1.4; border-radius: var(--radius-full); border: 1px solid var(--color-border); color: var(--color-text-secondary); background: transparent; white-space: nowrap; transition: border-color .15s ease, filter .15s ease; }
.storage-tag:hover { border-color: var(--color-border-active); }
.storage-tag-active { border-color: var(--color-primary); color: var(--color-primary); background-color: var(--color-primary-subtle); }
.storage-tag-active:hover { filter: brightness(1.08); }
.storage-tag .check-icon { width: 12px; height: 12px; flex-shrink: 0; }
.new-tag { display: inline-flex; align-items: center; padding: 1px 6px; min-width: 28px; font-family: var(--font-sans); font-size: 0.6875rem; font-weight: 600; line-height: 1.4; border-radius: var(--radius-full); background-color: var(--color-state-manageable-bg); color: var(--color-state-manageable); white-space: nowrap; }
.storage-checkbox-label .new-tag { margin-left: var(--space-xs); }
/* @component-css-end */
</style>
</head>
<body>
<h1 class="page-title">Tag Component</h1>

<div class="section">
  <span class="section-label">Default Tag</span>
  <div class="row">
    <span class="storage-tag">Web开发</span>
    <span class="storage-tag">游戏开发</span>
    <span class="storage-tag">自媒体运营</span>
  </div>
</div>

<div class="section">
  <span class="section-label">Active Tag</span>
  <div class="row">
    <span class="storage-tag storage-tag-active"><i data-lucide="check" class="check-icon"></i>Web开发</span>
  </div>
</div>

<div class="section">
  <span class="section-label">New Tag</span>
  <div class="row">
    <span class="new-tag">NEW</span>
  </div>
</div>

<hr class="divider">

<div class="section">
  <span class="section-label">In Context — Scenario Tags</span>
  <div class="row">
    <span class="storage-tag storage-tag-active"><i data-lucide="check" class="check-icon"></i>Web开发</span>
    <span class="storage-tag">游戏开发</span>
    <span class="storage-tag">自媒体运营</span>
    <span class="storage-tag">3D渲染</span>
    <span class="storage-tag">视频剪辑</span>
  </div>
</div>

<div class="section">
  <span class="section-label">In Context — New Item</span>
  <div class="row">
    <label class="storage-checkbox-label">
      <input type="checkbox" class="storage-checkbox">
      <span>Design Assets<span class="new-tag">NEW</span></span>
    </label>
  </div>
</div>

<script>lucide.createIcons();</script>
</body>
</html>
