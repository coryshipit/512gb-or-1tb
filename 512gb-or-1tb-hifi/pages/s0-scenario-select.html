  .mini-bar { display: flex; align-items: center; gap: var(--space-sm); }
  .mini-bar .bar { flex: 1; height: 12px; background: var(--color-bg-surface); border-radius: var(--radius-full); overflow: hidden; }
  .mini-bar .bar .fill { height: 100%; background: var(--color-state-manageable); border-radius: var(--radius-full); }
  .mini-bar .pct { font-family: var(--font-mono); font-size: 0.8125rem; font-weight: var(--font-weight-mono-lg); color: var(--color-state-manageable); white-space: nowrap; }
  .legend { display: grid; grid-template-columns: 1fr 1fr; gap: var(--space-sm) var(--space-md); }
  .legend-row { display: flex; align-items: center; gap: var(--space-sm); }
  .legend-dot { width: 8px; height: 8px; border-radius: var(--radius-full); flex-shrink: 0; }
  .legend-label { font-size: 0.75rem; color: var(--color-text-secondary); white-space: nowrap; }
  .legend-val { font-family: var(--font-mono); font-size: 0.75rem; color: var(--color-text-tertiary); margin-left: auto; white-space: nowrap; }

/* ── Tag ───────────────────────────────────────────────────── */
/* @anatomy
   <span class="storage-tag">Web开发</span> <span class="storage-tag">游戏开发</span> <span class="storage-tag">自媒体运营</span>
*/
/* Component definitions — extracted to components.css by deterministic script */
.storage-tag { display: inline-flex; align-items: center; gap: 4px; padding: 2px 10px; min-width: 28px; font-family: var(--font-mono); font-size: 0.75rem; font-weight: 500; line-height: 1.4; border-radius: var(--radius-full); border: 1px solid var(--color-border); color: var(--color-text-secondary); background: transparent; white-space: nowrap; transition: border-color .15s ease, filter .15s ease; }
.storage-tag:hover { border-color: var(--color-border-active); }
.storage-tag-active { border-color: var(--color-primary); color: var(--color-primary); background-color: var(--color-primary-subtle); }
.storage-tag-active:hover { filter: brightness(1.08); }
.storage-tag .check-icon { width: 12px; height: 12px; flex-shrink: 0; }
.new-tag { display: inline-flex; align-items: center; padding: 1px 6px; min-width: 28px; font-family: var(--font-sans); font-size: 0.6875rem; font-weight: 600; line-height: 1.4; border-radius: var(--radius-full); background-color: var(--color-state-manageable-bg); color: var(--color-state-manageable); white-space: nowrap; }
.storage-checkbox-label .new-tag { margin-left: 4px; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4.3.1/dist/index.global.js"></script>
    <script src="https://unpkg.com/lucide@1.8.0/dist/umd/lucide.min.js"></script>
    <style type="text/tailwindcss">
  @theme inline {
    --color-background: var(--storage-background);
    --color-foreground: var(--storage-foreground);
    --color-card: var(--storage-card);
    --color-primary: var(--storage-primary);
    --color-muted: var(--storage-muted);
    --color-muted-foreground: var(--storage-muted-foreground);
    --color-border: var(--storage-border);
    --radius-sm: var(--storage-radius-sm);
    --radius-md: var(--storage-radius-md);
    --radius-lg: var(--storage-radius-lg);
  }
  @layer base {
    body { background: var(--storage-background); color: var(--storage-foreground); }
    td, th { @apply break-words; word-break: break-all; word-break: auto-phrase; }
    th { @apply whitespace-nowrap; }
  }
    </style>
    <style id="semantic-token-fallback">
      .bg-background { background-color: var(--storage-background); }
      .text-background { color: var(--storage-background); }
      .border-background { border-color: var(--storage-background); }
      .ring-background { --tw-ring-color: var(--storage-background); }
      .bg-foreground { background-color: var(--storage-foreground); }
      .text-foreground { color: var(--storage-foreground); }
      .border-foreground { border-color: var(--storage-foreground); }
      .ring-foreground { --tw-ring-color: var(--storage-foreground); }
      .bg-card { background-color: var(--storage-card); }
      .text-card { color: var(--storage-card); }
      .border-card { border-color: var(--storage-card); }
      .ring-card { --tw-ring-color: var(--storage-card); }
      .bg-primary { background-color: var(--storage-primary); }
      .text-primary { color: var(--storage-primary); }
      .border-primary { border-color: var(--storage-primary); }
      .ring-primary { --tw-ring-color: var(--storage-primary); }
      .bg-muted { background-color: var(--storage-muted); }
      .text-muted { color: var(--storage-muted); }
      .border-muted { border-color: var(--storage-muted); }
      .ring-muted { --tw-ring-color: var(--storage-muted); }
      .bg-muted-foreground { background-color: var(--storage-muted-foreground); }
      .text-muted-foreground { color: var(--storage-muted-foreground); }
      .border-muted-foreground { border-color: var(--storage-muted-foreground); }
      .ring-muted-foreground { --tw-ring-color: var(--storage-muted-foreground); }
      .bg-border { background-color: var(--storage-border); }
      .text-border { color: var(--storage-border); }
      .border-border { border-color: var(--storage-border); }
      .ring-border { --tw-ring-color: var(--storage-border); }
    </style>
    <style>
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
      [data-icon] {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        -webkit-mask-size: contain;
        mask-size: contain;
        -webkit-mask-repeat: no-repeat;
        mask-repeat: no-repeat;
        -webkit-mask-position: center;
        mask-position: center;
        background-color: currentColor;
      }
    </style>
</head>
<body>
    <!-- ===== Header (sticky, 56px, full-width, 800px inner) ===== -->
    <header class="sticky top-0 z-50 h-14" style="background-color: var(--storage-bg-elevated); border-bottom: 1px solid var(--storage-border);">
      <div class="mx-auto flex h-full max-w-[800px] items-center justify-between px-6">
        <!-- Logo: JetBrains Mono, 1rem, 600, brand primary -->
        <span style="font-family: var(--font-mono); font-size: 1rem; font-weight: 600; color: var(--storage-primary); white-space: nowrap;">512GB or 1TB</span>
        <!-- Right side: language toggle + GitHub link -->
        <div class="flex items-center gap-4">
          <!-- Language toggle: 中 active / EN inactive -->
          <span class="text-sm whitespace-nowrap">
            <span class="lang-btn" style="color: var(--storage-text-primary);">中</span>
            <span style="color: var(--storage-text-tertiary);"> / </span>
            <span class="lang-btn" style="color: var(--storage-text-tertiary);">EN</span>
          </span>
          <!-- GitHub link -->
          <a href="#" class="github-link inline-flex items-center gap-1 text-sm whitespace-nowrap" style="color: var(--storage-text-tertiary); text-decoration: none;">
            <i data-lucide="github" style="width: 16px; height: 16px;"></i>
            <span>GitHub</span>
          </a>
        </div>
      </div>
    </header>

    <!-- ===== Hero Section (S0 only — single-line title) ===== -->
    <section class="mx-auto max-w-[800px] text-center" style="padding: 48px 24px 32px;">
      <h1 style="margin: 0; font-family: var(--font-sans); font-size: 1.5rem; font-weight: 700; line-height: 1.3; color: var(--storage-text-primary); text-wrap: balance; word-break: keep-all; overflow-wrap: break-word;">
        选择使用场景，估算存储需求，做出购买决策
      </h1>
    </section>

    <!-- ===== Main Content (800px, single column) ===== -->
    <main class="mx-auto max-w-[800px] px-6" style="padding-bottom: 48px;">
      <!-- Section Header -->
      <div>
        <h2 class="storage-h2" style="margin: 0 0 8px 0;">你用电脑做什么？</h2>
        <p style="font-size: 0.75rem; color: var(--storage-text-tertiary); font-style: italic; margin: 0 0 20px 0;">可多选，系统将合并所有场景的配置</p>
      </div>

      <!-- Scenario Cards Grid (3x2 desktop / 2-col sm / 1-col mobile) -->
      <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-3">
        <!-- Card 1: Web开发 (pre-selected) -->
        <div class="scenario-card is-selected" role="button" tabindex="0" aria-label="选择场景：Web开发" aria-pressed="true">
          <i data-lucide="code-2" class="icon"></i>
          <div class="title">Web开发</div>
          <div class="desc">网站、Web应用、后端服务</div>
        </div>
        <!-- Card 2: 移动应用开发 -->
        <div class="scenario-card" role="button" tabindex="0" aria-label="选择场景：移动应用开发" aria-pressed="false">
          <i data-lucide="smartphone" class="icon"></i>
          <div class="title">移动应用开发</div>
          <div class="desc">iOS / Android 应用</div>
        </div>
        <!-- Card 3: 桌面应用开发 -->
        <div class="scenario-card" role="button" tabindex="0" aria-label="选择场景：桌面应用开发" aria-pressed="false">
          <i data-lucide="monitor" class="icon"></i>
          <div class="title">桌面应用开发</div>
          <div class="desc">Windows / Mac 桌面应用</div>
        </div>
        <!-- Card 4: 设计师 -->
        <div class="scenario-card" role="button" tabindex="0" aria-label="选择场景：设计师" aria-pressed="false">
          <i data-lucide="palette" class="icon"></i>
          <div class="title">设计师</div>
          <div class="desc">平面、UI、产品设计</div>
        </div>
        <!-- Card 5: 游戏开发 -->
        <div class="scenario-card" role="button" tabindex="0" aria-label="选择场景：游戏开发" aria-pressed="false">
          <i data-lucide="gamepad-2" class="icon"></i>
          <div class="title">游戏开发</div>
          <div class="desc">Unity / Unreal 游戏</div>
        </div>
        <!-- Card 6: 自媒体运营 -->
        <div class="scenario-card" role="button" tabindex="0" aria-label="选择场景：自媒体运营" aria-pressed="false">
          <i data-lucide="video" class="icon"></i>
          <div class="title">自媒体运营</div>
          <div class="desc">文案撰写、音视频剪辑</div>
        </div>
      </div>

      <!-- CTA Button (full-width, centered text, with arrow icon) -->
      <div style="margin-top: 32px;">
        <a href="#" data-dom-id="cta-select-scenario" class="btn btn-primary cta-full" aria-disabled="false" style="text-decoration: none;">
          开始估算
          <i data-lucide="arrow-right" style="width: 16px; height: 16px;"></i>
        </a>
      </div>
    </main>

    <!-- ===== Footer (inline caption, no background) ===== -->
    <footer style="padding: 16px 24px; text-align: center;">
      <p class="storage-caption" style="max-width: 800px; margin: 0 auto;">纯本地计算，不收集数据 · 数据更新: 2026-07</p>
    </footer>

    <!-- ===== Lucide Icons Init ===== -->
    <script>lucide.createIcons();</script>

    <!-- ===== Scenario Card Selection Toggle + CTA State (vanilla JS) ===== -->
    <script>
      (function() {
        var cards = document.querySelectorAll('.scenario-card');
        var cta = document.querySelector('[data-dom-id="cta-select-scenario"]');

        function updateCtaState() {
          var anySelected = document.querySelector('.scenario-card.is-selected') !== null;
          cta.setAttribute('aria-disabled', anySelected ? 'false' : 'true');
        }

        function toggleCard(card) {
          var willSelect = !card.classList.contains('is-selected');
          card.classList.toggle('is-selected');
          card.setAttribute('aria-pressed', willSelect ? 'true' : 'false');
          updateCtaState();
        }

        cards.forEach(function(card) {
          card.addEventListener('click', function() { toggleCard(card); });
          card.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' || e.key === ' ') {
              e.preventDefault();
              toggleCard(card);
            }
          });
        });

        // Sync initial state (Web开发 pre-selected -> CTA active)
        updateCtaState();
      })();
    </script>

    <style>
      * { box-sizing: border-box; }
      html { background-color: var(--storage-bg-base); }
      body {
        margin: 0;
        font-family: var(--font-sans);
        font-size: 14px;
        line-height: 1.6;
        -webkit-font-smoothing: antialiased;
      }

      /* [data-icon] mask (carried from low-fi) */
      [data-icon] {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        -webkit-mask-size: contain;
        mask-size: contain;
        -webkit-mask-repeat: no-repeat;
        mask-repeat: no-repeat;
        -webkit-mask-position: center;
        mask-position: center;
        background-color: currentColor;
      }

      /* Header interactive affordances */
      .lang-btn { transition: color 0.15s ease; cursor: pointer; }
      .lang-btn:hover { color: var(--storage-text-secondary); }
      .github-link { transition: color 0.15s ease; }
      .github-link:hover { color: var(--storage-text-secondary); }

      /* Scenario card content overrides (per S0 spec) */
      .scenario-card .icon {
        width: 24px;
        height: 24px;
        color: var(--storage-text-secondary);
        flex-shrink: 0;
      }
      .scenario-card.is-selected .icon { color: var(--storage-primary); }
      .scenario-card .title {
        font-size: 0.875rem;
        font-weight: 600;
        line-height: 1.4;
        color: var(--storage-text-primary);
      }
      .scenario-card .desc {
        font-size: 0.75rem;
        line-height: 1.4;
        color: var(--storage-text-tertiary);
      }
      /* Global focus management — mouse click: no ring; keyboard tab: visible ring */
      *:focus:not(:focus-visible) { outline: none; }
      *:focus-visible {
        outline: 2px solid var(--storage-primary-action);
        outline-offset: 2px;
      }
      /* CTA full-width centered button */
      .btn.btn-primary.cta-full {
        display: flex;
        width: 100%;
        justify-content: center;
        align-items: center;
        gap: 8px;
      }
      .btn.btn-primary[aria-disabled="true"] {
        background: var(--storage-bg-surface);
        color: var(--storage-text-tertiary);
        cursor: not-allowed;
        pointer-events: none;
        border: 1px solid var(--storage-border);
      }

      /* Reduced motion: downgrade all transitions */
      @media (prefers-reduced-motion: reduce) {
        * { transition-duration: 0.01ms !important; }
      }

      /* Responsive breakpoints (design-spec: sm < 640px, md 640-767px, lg+ >= 768px) */
      @media (max-width: 639px) {
        .scenario-card { padding: 16px; }
        .grid-cols-1 { gap: 8px; }
        section h1 { font-size: 1.25rem !important; }
        section[style*="padding: 48px 24px 32px"] { padding: 24px 16px 16px; }
        main[class*="px-6"] { padding-left: 16px; padding-right: 16px; }
        header .px-6 { padding-left: 16px; padding-right: 16px; }
      }
      @media (max-width: 767px) and (min-width: 640px) {
        .scenario-card { padding: 18px; }
      }
    </style>
</body>
</html>
