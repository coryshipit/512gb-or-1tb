<!DOCTYPE html>
<html lang="zh-CN" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>配置态 — 调整配置</title>
    <style id="theme-vars">
/* ============================================
   512GB or 1TB — Brand CSS (Dark Mode)
   Prefix: storage
   ============================================ */

:root {
  /* --- Background Layers (5-tier) --- */
  --storage-bg-base: #0b1326;
  --storage-bg-elevated: #171f33;
  --storage-bg-surface: #1e2740;
  --storage-bg-overlay: #2d3449;

  /* --- Text Layers (3-tier) --- */
  --storage-text-primary: #dae2fd;
  --storage-text-secondary: #a0a8c0;
  --storage-text-tertiary: #8d90a0;

  /* --- Brand Primary (single hue) --- */
  --storage-primary: #b4c5ff;
  --storage-primary-action: #2563eb;
  --storage-primary-hover: #1d4ed8;
  --storage-primary-subtle: rgba(180, 197, 255, 0.08);

  /* --- Border --- */
  --storage-border: #2a3450;
  --storage-border-hover: #3d4868;
  --storage-border-active: #4a5a8a;

  /* --- Status Colors (semantic only) --- */
  --state-critical: #ef4444;
  --state-critical-bg: rgba(239, 68, 68, 0.1);
  --state-manageable: #f59e0b;
  --state-manageable-bg: rgba(245, 158, 11, 0.1);
  --state-comfortable: #3b82f6;
  --state-comfortable-bg: rgba(59, 130, 246, 0.1);
  --state-abundant: #22c55e;
  --state-abundant-bg: rgba(34, 197, 94, 0.1);

  /* --- Radius Scale --- */
  --radius-sm: 4px;
  --radius-md: 8px;
  --radius-lg: 12px;
  --radius-full: 9999px;

  /* --- Typography --- */
  --font-sans: 'Inter', system-ui, -apple-system, 'Segoe UI', sans-serif;
  --font-mono: 'JetBrains Mono', 'Fira Code', 'Consolas', monospace;

  /* --- Spacing --- */
  --space-xs: 4px;
  --space-sm: 8px;
  --space-md: 16px;
  --space-lg: 24px;
  --space-xl: 32px;
  --space-2xl: 48px;

  /* --- Max Width --- */
  --storage-max-width: 1200px;

  /* --- Semantic Aliases (for fill-html-head.mjs compatibility) --- */
  --storage-background: var(--storage-bg-base);
  --storage-foreground: var(--storage-text-primary);
  --storage-card: var(--storage-bg-elevated);
  --storage-muted: var(--storage-bg-surface);
  --storage-muted-foreground: var(--storage-text-secondary);
  --storage-radius-sm: var(--radius-sm);
  --storage-radius-md: var(--radius-md);
  --storage-radius-lg: var(--radius-lg);
}

/* ============================================
   Typography Classes
   ============================================ */

.storage-h1 {
  font-family: var(--font-sans);
  font-size: 2rem;
  font-weight: 700;
  line-height: 1.3;
  letter-spacing: -0.02em;
  color: var(--storage-text-primary);
}

.storage-h2 {
  font-family: var(--font-sans);
  font-size: 1.5rem;
  font-weight: 600;
  line-height: 1.35;
  letter-spacing: -0.01em;
  color: var(--storage-text-primary);
}

.storage-h3 {
  font-family: var(--font-sans);
  font-size: 1.125rem;
  font-weight: 600;
  line-height: 1.4;
  color: var(--storage-text-primary);
}

.storage-body {
  font-family: var(--font-sans);
  font-size: 0.875rem;
  font-weight: 400;
  line-height: 1.6;
  color: var(--storage-text-secondary);
}

.storage-caption {
  font-family: var(--font-sans);
  font-size: 0.75rem;
  font-weight: 400;
  line-height: 1.5;
  color: var(--storage-text-tertiary);
}

.storage-mono {
  font-family: var(--font-mono);
  font-size: 0.875rem;
  font-weight: 500;
  color: var(--storage-text-primary);
}

.storage-mono-lg {
  font-family: var(--font-mono);
  font-size: 1.5rem;
  font-weight: 600;
  color: var(--storage-text-primary);
}

/* ============================================
   Component Utility Classes
   ============================================ */

.storage-card {
  background-color: var(--storage-bg-elevated);
  border: 1px solid var(--storage-border);
  border-radius: var(--radius-lg);
  padding: var(--space-lg);
}

.storage-card-surface {
  background-color: var(--storage-bg-surface);
  border: 1px solid var(--storage-border);
  border-radius: var(--radius-md);
  padding: var(--space-md);
}

.storage-btn-primary {
  display: inline-flex;
  align-items: center;
  gap: var(--space-sm);
  padding: 10px 20px;
  background-color: var(--storage-primary-action);
  color: #ffffff;
  font-family: var(--font-sans);
  font-size: 0.875rem;
  font-weight: 500;
  border: none;
  border-radius: var(--radius-md);
  cursor: pointer;
  transition: background-color 0.15s ease;
}

.storage-btn-primary:hover {
  background-color: var(--storage-primary-hover);
}

.storage-btn-secondary {
  display: inline-flex;
  align-items: center;
  gap: var(--space-sm);
  padding: 10px 20px;
  background-color: transparent;
  color: var(--storage-text-primary);
  font-family: var(--font-sans);
  font-size: 0.875rem;
  font-weight: 500;
  border: 1px solid var(--storage-border);
  border-radius: var(--radius-md);
  cursor: pointer;
  transition: border-color 0.15s ease;
}

.storage-btn-secondary:hover {
  border-color: var(--storage-border-hover);
}

.storage-tag {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 2px 10px;
  font-family: var(--font-mono);
  font-size: 0.75rem;
  font-weight: 500;
  border-radius: var(--radius-full);
  border: 1px solid var(--storage-border);
  color: var(--storage-text-secondary);
}

.storage-tag-active {
  border-color: var(--storage-primary);
  color: var(--storage-primary);
  background-color: var(--storage-primary-subtle);
}

.storage-badge {
  display: inline-flex;
  align-items: center;
  padding: 2px 10px;
  font-family: var(--font-sans);
  font-size: 0.75rem;
  font-weight: 600;
  border-radius: var(--radius-full);
}

.storage-badge-critical {
  background-color: var(--state-critical-bg);
  color: var(--state-critical);
}

.storage-badge-manageable {
  background-color: var(--state-manageable-bg);
  color: var(--state-manageable);
}

.storage-badge-comfortable {
  background-color: var(--state-comfortable-bg);
  color: var(--state-comfortable);
}

.storage-badge-abundant {
  background-color: var(--state-abundant-bg);
  color: var(--state-abundant);
}

.storage-input {
  width: 100%;
  padding: 8px 12px;
  background-color: var(--storage-bg-surface);
  border: 1px solid var(--storage-border);
  border-radius: var(--radius-md);
  color: var(--storage-text-primary);
  font-family: var(--font-sans);
  font-size: 0.875rem;
  outline: none;
  transition: border-color 0.15s ease;
}

.storage-input:focus {
  border-color: var(--storage-primary-action);
}

.storage-checkbox-label {
  display: inline-flex;
  align-items: center;
  gap: var(--space-sm);
  font-family: var(--font-sans);
  font-size: 0.875rem;
  color: var(--storage-text-primary);
  cursor: pointer;
}

.storage-checkbox {
  width: 16px;
  height: 16px;
  accent-color: var(--storage-primary-action);
}

.storage-divider {
  height: 1px;
  background-color: var(--storage-border);
  border: none;
  margin: var(--space-md) 0;
}

    </style>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4.3.1/dist/index.global.js"></script>
    <script src="https://unpkg.com/lucide@1.8.0/dist/umd/lucide.min.js"></script>
    <style type="text/tailwindcss">
  @theme inline {
    --color-background: var(--storage-background);
    --color-foreground: var(--storage-foreground);
    --color-card: var(--storage-card);
    --color-primary: var(--storage-primary);
    --color-muted: var(--storage-muted);
    --color-muted-foreground: var(--storage-muted-foreground);
    --color-border: var(--storage-border);
    --radius-sm: var(--storage-radius-sm);
    --radius-md: var(--storage-radius-md);
    --radius-lg: var(--storage-radius-lg);
  }
  @layer base {
    body { background: var(--storage-background); color: var(--storage-foreground); }
    td, th { @apply break-words; word-break: break-all; word-break: auto-phrase; }
    th { @apply whitespace-nowrap; }
  }
    </style>
    <style id="semantic-token-fallback">
      .bg-background { background-color: var(--storage-background); }
      .text-background { color: var(--storage-background); }
      .border-background { border-color: var(--storage-background); }
      .ring-background { --tw-ring-color: var(--storage-background); }
      .bg-foreground { background-color: var(--storage-foreground); }
      .text-foreground { color: var(--storage-foreground); }
      .border-foreground { border-color: var(--storage-foreground); }
      .ring-foreground { --tw-ring-color: var(--storage-foreground); }
      .bg-card { background-color: var(--storage-card); }
      .text-card { color: var(--storage-card); }
      .border-card { border-color: var(--storage-card); }
      .ring-card { --tw-ring-color: var(--storage-card); }
      .bg-primary { background-color: var(--storage-primary); }
      .text-primary { color: var(--storage-primary); }
      .border-primary { border-color: var(--storage-primary); }
      .ring-primary { --tw-ring-color: var(--storage-primary); }
      .bg-muted { background-color: var(--storage-muted); }
      .text-muted { color: var(--storage-muted); }
      .border-muted { border-color: var(--storage-muted); }
      .ring-muted { --tw-ring-color: var(--storage-muted); }
      .bg-muted-foreground { background-color: var(--storage-muted-foreground); }
      .text-muted-foreground { color: var(--storage-muted-foreground); }
      .border-muted-foreground { border-color: var(--storage-muted-foreground); }
      .ring-muted-foreground { --tw-ring-color: var(--storage-muted-foreground); }
      .bg-border { background-color: var(--storage-border); }
      .text-border { color: var(--storage-border); }
      .border-border { border-color: var(--storage-border); }
      .ring-border { --tw-ring-color: var(--storage-border); }
    </style>
    <style>
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
      [data-icon] {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        -webkit-mask-size: contain;
        mask-size: contain;
        -webkit-mask-repeat: no-repeat;
        mask-repeat: no-repeat;
        -webkit-mask-position: center;
        mask-position: center;
        background-color: currentColor;
      }
    </style>
</head>
<body>
    <!-- ===== Header Bar (copy from S0, max-width 800px) ===== -->
    <header class="sticky top-0 z-50 h-14" style="background-color: var(--storage-bg-elevated); border-bottom: 1px solid var(--storage-border);">
      <div class="mx-auto flex h-full max-w-[800px] items-center justify-between px-6">
        <span style="font-family: var(--font-mono); font-size: 1rem; font-weight: 600; color: var(--storage-primary); white-space: nowrap;">512GB or 1TB</span>
        <div class="flex items-center gap-4">
          <span class="text-sm whitespace-nowrap">
            <span class="lang-btn" style="color: var(--storage-text-primary); cursor: pointer;">中</span>
            <span style="color: var(--storage-text-tertiary);"> / </span>
            <span class="lang-btn" style="color: var(--storage-text-tertiary); cursor: pointer;">EN</span>
          </span>
          <a href="#" class="github-link inline-flex items-center gap-1 text-sm whitespace-nowrap" style="color: var(--storage-text-tertiary); text-decoration: none;">
            <i data-lucide="github" style="width: 16px; height: 16px;"></i>
            <span>GitHub</span>
          </a>
        </div>
      </div>
    </header>

    <!-- ===== Sticky Mini Result Bar (AMBER — tight state) ===== -->
    <div class="sticky top-14 z-40" style="background-color: var(--storage-bg-elevated); border-bottom: 1px solid var(--storage-border);">
      <div class="mx-auto flex items-center gap-3" style="max-width: 800px; padding: 10px 24px;">
        <div style="flex: 1; height: 6px; background-color: var(--storage-bg-surface); border-radius: var(--radius-full); overflow: hidden;">
          <div style="width: 89%; height: 100%; background-color: var(--state-manageable);"></div>
        </div>
        <span style="font-family: var(--font-mono); font-size: 0.8125rem; font-weight: 600; color: var(--state-manageable); white-space: nowrap;">11%</span>
      </div>
    </div>

    <!-- ===== Hero (compact — title only, no subtitle) ===== -->
    <section class="mx-auto max-w-[800px] text-center" style="padding: 24px;">
      <h1 style="font-family: var(--font-sans); font-size: 1.25rem; font-weight: 600; color: var(--storage-text-primary); margin: 0;">
        512GB 还是 1TB？
      </h1>
    </section>

    <!-- ===== Main Content Area (Single Column, max-width 800px) ===== -->
    <main class="mx-auto max-w-[800px] px-6" style="padding-bottom: 48px;">

      <!-- 4a. Collapsed Scenario Module -->
      <div class="storage-card" style="margin-bottom: 24px;">
        <div class="flex items-center justify-between">
          <div class="flex items-center gap-3">
            <span style="font-size: 0.75rem; color: var(--storage-text-tertiary); text-transform: uppercase; letter-spacing: 0.05em;">已选场景</span>
            <span class="storage-tag storage-tag-active">
              <i data-lucide="check" style="width: 12px; height: 12px;"></i>
              Web开发
            </span>
          </div>
          <button class="storage-btn-secondary" style="padding: 6px 12px; font-size: 0.75rem;">
            <i data-lucide="settings-2" style="width: 14px; height: 14px;"></i>
            修改
          </button>
        </div>
      </div>

      <!-- 4b. Config Panel (user-modified config, merged from old S2) -->
      <div class="storage-card" style="margin-bottom: 24px;">

        <!-- 容量选择 -->
        <div>
          <p style="font-size: 0.875rem; font-weight: 500; color: var(--storage-text-primary); margin: 0 0 8px 0;">容量</p>
          <div class="flex flex-wrap gap-2">
            <button class="capacity-btn">256GB</button>
            <button class="capacity-btn capacity-btn-selected">
              <span>512GB</span>
            </button>
            <button class="capacity-btn capacity-btn-recommended">
              <span>1TB</span>
              <span style="color: var(--state-manageable);">★</span>
            </button>
            <button class="capacity-btn">2TB</button>
          </div>
          <div style="margin-top: 12px; background-color: var(--state-manageable-bg); border-left: 3px solid var(--state-manageable); border-radius: var(--radius-sm); padding: 8px 12px;">
            <p style="font-size: 0.75rem; color: var(--state-manageable); margin: 0;">推荐选择更大容量</p>
          </div>
        </div>

        <hr class="storage-divider">

        <!-- 操作系统 -->
        <div>
          <p style="font-size: 0.875rem; font-weight: 500; color: var(--storage-text-primary); margin: 0 0 8px 0;">操作系统</p>
          <div class="flex flex-wrap gap-2">
            <button class="capacity-btn capacity-btn-selected">macOS</button>
            <button class="capacity-btn">Windows</button>
            <button class="capacity-btn">Linux</button>
          </div>
        </div>

        <hr class="storage-divider">

        <!-- 开发工具 -->
        <div>
          <p style="font-size: 0.875rem; font-weight: 500; color: var(--storage-text-primary); margin: 0 0 12px 0;">开发工具</p>

          <!-- 编辑器 -->
          <div style="margin-bottom: 12px;">
            <p style="font-size: 0.75rem; color: var(--storage-text-tertiary); margin: 0 0 6px 0;">编辑器</p>
            <div style="display: flex; flex-wrap: wrap; gap: 6px 16px;">
              <label class="storage-checkbox-label">
                <input type="checkbox" class="storage-checkbox" checked>
                <span>VS Code</span>
                <span style="font-family: var(--font-mono); font-size: 0.75rem; color: var(--storage-text-tertiary);">[2GB]</span>
              </label>
            </div>
          </div>

          <!-- 版本控制 -->
          <div style="margin-bottom: 12px;">
            <p style="font-size: 0.75rem; color: var(--storage-text-tertiary); margin: 0 0 6px 0;">版本控制</p>
            <div style="display: flex; flex-wrap: wrap; gap: 6px 16px;">
              <label class="storage-checkbox-label">
                <input type="checkbox" class="storage-checkbox" checked>
                <span>Git</span>
                <span style="font-family: var(--font-mono); font-size: 0.75rem; color: var(--storage-text-tertiary);">[1GB]</span>
              </label>
              <label class="storage-checkbox-label">
                <input type="checkbox" class="storage-checkbox" checked>
                <span>GitHub Desktop</span>
                <span style="font-family: var(--font-mono); font-size: 0.75rem; color: var(--storage-text-tertiary);">[1GB]</span>
              </label>
            </div>
          </div>

          <!-- 运行时 -->
          <div style="margin-bottom: 12px;">
            <p style="font-size: 0.75rem; color: var(--storage-text-tertiary); margin: 0 0 6px 0;">运行时</p>
            <div style="display: flex; flex-wrap: wrap; gap: 6px 16px;">
              <label class="storage-checkbox-label">
                <input type="checkbox" class="storage-checkbox" checked>
                <span>Node.js</span>
                <span style="font-family: var(--font-mono); font-size: 0.75rem; color: var(--storage-text-tertiary);">[15GB]</span>
              </label>
              <label class="storage-checkbox-label">
                <input type="checkbox" class="storage-checkbox" checked>
                <span>Python</span>
                <span style="font-family: var(--font-mono); font-size: 0.75rem; color: var(--storage-text-tertiary);">[10GB]</span>
              </label>
            </div>
          </div>

          <!-- 设计 -->
          <div>
            <p style="font-size: 0.75rem; color: var(--storage-text-tertiary); margin: 0 0 6px 0;">设计</p>
            <div style="display: flex; flex-wrap: wrap; gap: 6px 16px;">
              <label class="storage-checkbox-label">
                <input type="checkbox" class="storage-checkbox" checked>
                <span>Figma</span>
                <span style="font-family: var(--font-mono); font-size: 0.75rem; color: var(--storage-text-tertiary);">[2GB]</span>
              </label>
              <label class="storage-checkbox-label">
                <input type="checkbox" class="storage-checkbox" checked>
                <span>Design Assets</span>
                <span style="font-family: var(--font-mono); font-size: 0.75rem; color: var(--storage-text-tertiary);">[50GB]</span>
                <span class="new-tag">新增</span>
              </label>
            </div>
          </div>
        </div>

        <hr class="storage-divider">

        <!-- AI Tools -->
        <div>
          <p style="font-size: 0.875rem; font-weight: 500; color: var(--storage-text-primary); margin: 0 0 8px 0;">AI Tools</p>
          <label class="storage-checkbox-label">
            <input type="checkbox" class="storage-checkbox" checked>
            <span>Cursor</span>
            <span style="font-family: var(--font-mono); font-size: 0.75rem; color: var(--storage-text-tertiary);">[3GB]</span>
          </label>
        </div>

        <hr class="storage-divider">

        <!-- 目标平台 -->
        <div>
          <p style="font-size: 0.875rem; font-weight: 500; color: var(--storage-text-primary); margin: 0 0 8px 0;">目标平台</p>
          <label class="storage-checkbox-label">
            <input type="checkbox" class="storage-checkbox" checked>
            <span>Web</span>
            <span style="font-family: var(--font-mono); font-size: 0.75rem; color: var(--storage-text-tertiary);">[0GB]</span>
          </label>
        </div>

        <hr class="storage-divider">

        <!-- 运行环境 -->
        <div>
          <p style="font-size: 0.875rem; font-weight: 500; color: var(--storage-text-primary); margin: 0 0 4px 0;">运行环境</p>
          <p style="font-size: 0.75rem; color: var(--storage-text-tertiary); font-style: italic; margin: 0 0 12px 0;">以下为可选配置。如果你不确定是否需要，通常可以跳过。</p>
          <div style="display: flex; flex-wrap: wrap; gap: 6px 16px;">
            <label class="storage-checkbox-label">
              <input type="checkbox" class="storage-checkbox" checked>
              <span>Docker</span>
              <span style="font-family: var(--font-mono); font-size: 0.75rem; color: var(--storage-text-tertiary);">[50GB]</span>
              <span class="new-tag">新增</span>
            </label>
            <label class="storage-checkbox-label">
              <input type="checkbox" class="storage-checkbox" checked>
              <span>Windows VM</span>
              <span style="font-family: var(--font-mono); font-size: 0.75rem; color: var(--storage-text-tertiary);">[120GB]</span>
              <span class="new-tag">新增</span>
            </label>
            <label class="storage-checkbox-label">
              <input type="checkbox" class="storage-checkbox">
              <span>Linux VM</span>
              <span style="font-family: var(--font-mono); font-size: 0.75rem; color: var(--storage-text-tertiary);">[50GB]</span>
            </label>
            <label class="storage-checkbox-label">
              <input type="checkbox" class="storage-checkbox">
              <span>Dual Boot</span>
              <span style="font-family: var(--font-mono); font-size: 0.75rem; color: var(--storage-text-tertiary);">[150GB]</span>
            </label>
          </div>
        </div>

        <hr class="storage-divider">

        <!-- 项目数量 -->
        <div>
          <label for="project-count" style="display: block; font-size: 0.875rem; font-weight: 500; color: var(--storage-text-primary); margin-bottom: 12px;">Web开发 项目数量</label>
          <div class="flex items-center gap-3">
            <input type="range" id="project-count" class="range-slider" min="1" max="50" value="25" style="flex: 1;">
            <span style="font-family: var(--font-mono); font-size: 0.875rem; color: var(--storage-text-primary); white-space: nowrap;">25 个</span>
          </div>
        </div>

      </div>

      <!-- 4d. CTA Button -->
      <div style="margin-top: 24px;">
        <button class="storage-btn-primary" data-dom-id="cta-view-results">
          查看完整结果
          <i data-lucide="arrow-right" style="width: 16px; height: 16px;"></i>
        </button>
      </div>

      <!-- 4e. NO RESULT CARD — intentionally omitted; sticky mini bar provides feedback -->

    </main>

    <!-- ===== Footer (copy from S0) ===== -->
    <footer style="border-top: 1px solid var(--storage-border); padding: 24px; text-align: center;">

    <!-- ===== Custom Styles (free-explore: placed in body, not head) ===== -->
    <style>
      * { box-sizing: border-box; }
      html { background-color: var(--storage-bg-base); }
      body {
        margin: 0;
        font-family: var(--font-sans);
        font-size: 14px;
        line-height: 1.6;
      }
      /* Language toggle hover feedback */
      .lang-btn { transition: color 0.15s ease; }
      .lang-btn:hover { color: var(--storage-text-secondary); }
      /* GitHub link hover feedback */
      .github-link { transition: color 0.15s ease; }
      .github-link:hover { color: var(--storage-text-secondary); }
      /* Capacity buttons */
      .capacity-btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 4px;
        padding: 8px 16px;
        font-family: var(--font-sans);
        font-size: 0.875rem;
        font-weight: 500;
        color: var(--storage-text-secondary);
        background-color: var(--storage-bg-surface);
        border: 1px solid var(--storage-border);
        border-radius: var(--radius-md);
        cursor: pointer;
        transition: border-color 0.15s ease, color 0.15s ease;
        white-space: nowrap;
      }
      .capacity-btn:hover {
        border-color: var(--storage-border-hover);
        color: var(--storage-text-primary);
      }
      .capacity-btn:focus-visible {
        outline: 2px solid var(--storage-primary);
        outline-offset: 2px;
      }
      .capacity-btn-selected {
        background-color: var(--storage-primary-action);
        color: #ffffff;
        border-color: var(--storage-primary-action);
      }
      .capacity-btn-selected:hover {
        background-color: var(--storage-primary-hover);
        border-color: var(--storage-primary-hover);
      }
      .capacity-btn-recommended {
        border-color: var(--state-manageable);
        background-color: transparent;
      }
      /* "新增" amber tag */
      .new-tag {
        display: inline-flex;
        align-items: center;
        padding: 1px 6px;
        font-size: 0.6875rem;
        font-weight: 600;
        border-radius: var(--radius-full);
        background-color: var(--state-manageable-bg);
        color: var(--state-manageable);
        margin-left: 4px;
        white-space: nowrap;
      }
      /* Range slider custom styling */
      .range-slider {
        -webkit-appearance: none;
        appearance: none;
        height: 6px;
        background-color: var(--storage-bg-surface);
        border-radius: var(--radius-full);
        outline: none;
      }
      .range-slider::-webkit-slider-thumb {
        -webkit-appearance: none;
        appearance: none;
        width: 16px;
        height: 16px;
        background-color: var(--storage-primary-action);
        border-radius: 50%;
        cursor: pointer;
      }
      .range-slider::-moz-range-thumb {
        width: 16px;
        height: 16px;
        background-color: var(--storage-primary-action);
        border-radius: 50%;
        cursor: pointer;
        border: none;
      }
      .range-slider:focus-visible::-webkit-slider-thumb {
        box-shadow: 0 0 0 3px var(--storage-primary-subtle);
      }
      .range-slider:focus-visible::-moz-range-thumb {
        box-shadow: 0 0 0 3px var(--storage-primary-subtle);
      }
      /* Reduced motion: downgrade all transitions */
      @media (prefers-reduced-motion: reduce) {
        * { transition-duration: 0.01ms !important; }
      }
    </style>
