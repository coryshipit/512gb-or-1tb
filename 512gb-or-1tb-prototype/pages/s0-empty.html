<!DOCTYPE html>
<html lang="zh-CN" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>512GB 还是 1TB？</title>
    <style id="theme-vars">
/* ============================================
   512GB or 1TB — Brand CSS (Dark Mode)
   Prefix: storage
   ============================================ */

:root {
  /* --- Background Layers (5-tier) --- */
  --storage-bg-base: #0b1326;
  --storage-bg-elevated: #171f33;
  --storage-bg-surface: #1e2740;
  --storage-bg-overlay: #2d3449;

  /* --- Text Layers (3-tier) --- */
  --storage-text-primary: #dae2fd;
  --storage-text-secondary: #a0a8c0;
  --storage-text-tertiary: #8d90a0;

  /* --- Brand Primary (single hue) --- */
  --storage-primary: #b4c5ff;
  --storage-primary-action: #2563eb;
  --storage-primary-hover: #1d4ed8;
  --storage-primary-subtle: rgba(180, 197, 255, 0.08);

  /* --- Border --- */
  --storage-border: #2a3450;
  --storage-border-hover: #3d4868;
  --storage-border-active: #4a5a8a;

  /* --- Status Colors (semantic only) --- */
  --state-critical: #ef4444;
  --state-critical-bg: rgba(239, 68, 68, 0.1);
  --state-manageable: #f59e0b;
  --state-manageable-bg: rgba(245, 158, 11, 0.1);
  --state-comfortable: #3b82f6;
  --state-comfortable-bg: rgba(59, 130, 246, 0.1);
  --state-abundant: #22c55e;
  --state-abundant-bg: rgba(34, 197, 94, 0.1);

  /* --- Radius Scale --- */
  --radius-sm: 4px;
  --radius-md: 8px;
  --radius-lg: 12px;
  --radius-full: 9999px;

  /* --- Typography --- */
  --font-sans: 'Inter', system-ui, -apple-system, 'Segoe UI', sans-serif;
  --font-mono: 'JetBrains Mono', 'Fira Code', 'Consolas', monospace;

  /* --- Spacing --- */
  --space-xs: 4px;
  --space-sm: 8px;
  --space-md: 16px;
  --space-lg: 24px;
  --space-xl: 32px;
  --space-2xl: 48px;

  /* --- Max Width --- */
  --storage-max-width: 1200px;

  /* --- Semantic Aliases (for fill-html-head.mjs compatibility) --- */
  --storage-background: var(--storage-bg-base);
  --storage-foreground: var(--storage-text-primary);
  --storage-card: var(--storage-bg-elevated);
  --storage-muted: var(--storage-bg-surface);
  --storage-muted-foreground: var(--storage-text-secondary);
  --storage-radius-sm: var(--radius-sm);
  --storage-radius-md: var(--radius-md);
  --storage-radius-lg: var(--radius-lg);
}

/* ============================================
   Typography Classes
   ============================================ */

.storage-h1 {
  font-family: var(--font-sans);
  font-size: 2rem;
  font-weight: 700;
  line-height: 1.3;
  letter-spacing: -0.02em;
  color: var(--storage-text-primary);
}

.storage-h2 {
  font-family: var(--font-sans);
  font-size: 1.5rem;
  font-weight: 600;
  line-height: 1.35;
  letter-spacing: -0.01em;
  color: var(--storage-text-primary);
}

.storage-h3 {
  font-family: var(--font-sans);
  font-size: 1.125rem;
  font-weight: 600;
  line-height: 1.4;
  color: var(--storage-text-primary);
}

.storage-body {
  font-family: var(--font-sans);
  font-size: 0.875rem;
  font-weight: 400;
  line-height: 1.6;
  color: var(--storage-text-secondary);
}

.storage-caption {
  font-family: var(--font-sans);
  font-size: 0.75rem;
  font-weight: 400;
  line-height: 1.5;
  color: var(--storage-text-tertiary);
}

.storage-mono {
  font-family: var(--font-mono);
  font-size: 0.875rem;
  font-weight: 500;
  color: var(--storage-text-primary);
}

.storage-mono-lg {
  font-family: var(--font-mono);
  font-size: 1.5rem;
  font-weight: 600;
  color: var(--storage-text-primary);
}

/* ============================================
   Component Utility Classes
   ============================================ */

.storage-card {
  background-color: var(--storage-bg-elevated);
  border: 1px solid var(--storage-border);
  border-radius: var(--radius-lg);
  padding: var(--space-lg);
}

.storage-card-surface {
  background-color: var(--storage-bg-surface);
  border: 1px solid var(--storage-border);
  border-radius: var(--radius-md);
  padding: var(--space-md);
}

.storage-btn-primary {
  display: inline-flex;
  align-items: center;
  gap: var(--space-sm);
  padding: 10px 20px;
  background-color: var(--storage-primary-action);
  color: #ffffff;
  font-family: var(--font-sans);
  font-size: 0.875rem;
  font-weight: 500;
  border: none;
  border-radius: var(--radius-md);
  cursor: pointer;
  transition: background-color 0.15s ease;
}

.storage-btn-primary:hover {
  background-color: var(--storage-primary-hover);
}

.storage-btn-secondary {
  display: inline-flex;
  align-items: center;
  gap: var(--space-sm);
  padding: 10px 20px;
  background-color: transparent;
  color: var(--storage-text-primary);
  font-family: var(--font-sans);
  font-size: 0.875rem;
  font-weight: 500;
  border: 1px solid var(--storage-border);
  border-radius: var(--radius-md);
  cursor: pointer;
  transition: border-color 0.15s ease;
}

.storage-btn-secondary:hover {
  border-color: var(--storage-border-hover);
}

.storage-tag {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 2px 10px;
  font-family: var(--font-mono);
  font-size: 0.75rem;
  font-weight: 500;
  border-radius: var(--radius-full);
  border: 1px solid var(--storage-border);
  color: var(--storage-text-secondary);
}

.storage-tag-active {
  border-color: var(--storage-primary);
  color: var(--storage-primary);
  background-color: var(--storage-primary-subtle);
}

.storage-badge {
  display: inline-flex;
  align-items: center;
  padding: 2px 10px;
  font-family: var(--font-sans);
  font-size: 0.75rem;
  font-weight: 600;
  border-radius: var(--radius-full);
}

.storage-badge-critical {
  background-color: var(--state-critical-bg);
  color: var(--state-critical);
}

.storage-badge-manageable {
  background-color: var(--state-manageable-bg);
  color: var(--state-manageable);
}

.storage-badge-comfortable {
  background-color: var(--state-comfortable-bg);
  color: var(--state-comfortable);
}

.storage-badge-abundant {
  background-color: var(--state-abundant-bg);
  color: var(--state-abundant);
}

.storage-input {
  width: 100%;
  padding: 8px 12px;
  background-color: var(--storage-bg-surface);
  border: 1px solid var(--storage-border);
  border-radius: var(--radius-md);
  color: var(--storage-text-primary);
  font-family: var(--font-sans);
  font-size: 0.875rem;
  outline: none;
  transition: border-color 0.15s ease;
}

.storage-input:focus {
  border-color: var(--storage-primary-action);
}

.storage-checkbox-label {
  display: inline-flex;
  align-items: center;
  gap: var(--space-sm);
  font-family: var(--font-sans);
  font-size: 0.875rem;
  color: var(--storage-text-primary);
  cursor: pointer;
}

.storage-checkbox {
  width: 16px;
  height: 16px;
  accent-color: var(--storage-primary-action);
}

.storage-divider {
  height: 1px;
  background-color: var(--storage-border);
  border: none;
  margin: var(--space-md) 0;
}

    </style>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4.3.1/dist/index.global.js"></script>
    <script src="https://unpkg.com/lucide@1.8.0/dist/umd/lucide.min.js"></script>
    <style type="text/tailwindcss">
  @theme inline {
    --color-background: var(--storage-background);
    --color-foreground: var(--storage-foreground);
    --color-card: var(--storage-card);
    --color-primary: var(--storage-primary);
    --color-muted: var(--storage-muted);
    --color-muted-foreground: var(--storage-muted-foreground);
    --color-border: var(--storage-border);
    --radius-sm: var(--storage-radius-sm);
    --radius-md: var(--storage-radius-md);
    --radius-lg: var(--storage-radius-lg);
  }
  @layer base {
    body { background: var(--storage-background); color: var(--storage-foreground); }
    td, th { @apply break-words; word-break: break-all; word-break: auto-phrase; }
    th { @apply whitespace-nowrap; }
  }
    </style>
    <style id="semantic-token-fallback">
      .bg-background { background-color: var(--storage-background); }
      .text-background { color: var(--storage-background); }
      .border-background { border-color: var(--storage-background); }
      .ring-background { --tw-ring-color: var(--storage-background); }
      .bg-foreground { background-color: var(--storage-foreground); }
      .text-foreground { color: var(--storage-foreground); }
      .border-foreground { border-color: var(--storage-foreground); }
      .ring-foreground { --tw-ring-color: var(--storage-foreground); }
      .bg-card { background-color: var(--storage-card); }
      .text-card { color: var(--storage-card); }
      .border-card { border-color: var(--storage-card); }
      .ring-card { --tw-ring-color: var(--storage-card); }
      .bg-primary { background-color: var(--storage-primary); }
      .text-primary { color: var(--storage-primary); }
      .border-primary { border-color: var(--storage-primary); }
      .ring-primary { --tw-ring-color: var(--storage-primary); }
      .bg-muted { background-color: var(--storage-muted); }
      .text-muted { color: var(--storage-muted); }
      .border-muted { border-color: var(--storage-muted); }
      .ring-muted { --tw-ring-color: var(--storage-muted); }
      .bg-muted-foreground { background-color: var(--storage-muted-foreground); }
      .text-muted-foreground { color: var(--storage-muted-foreground); }
      .border-muted-foreground { border-color: var(--storage-muted-foreground); }
      .ring-muted-foreground { --tw-ring-color: var(--storage-muted-foreground); }
      .bg-border { background-color: var(--storage-border); }
      .text-border { color: var(--storage-border); }
      .border-border { border-color: var(--storage-border); }
      .ring-border { --tw-ring-color: var(--storage-border); }
    </style>
    <style>
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
      [data-icon] {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        -webkit-mask-size: contain;
        mask-size: contain;
        -webkit-mask-repeat: no-repeat;
        mask-repeat: no-repeat;
        -webkit-mask-position: center;
        mask-position: center;
        background-color: currentColor;
      }
    </style>
</head>
<body>
    <!-- ===== Header Bar (sticky, full-width, z-50, 800px inner) ===== -->
    <header class="sticky top-0 z-50 h-14" style="background-color: var(--storage-bg-elevated); border-bottom: 1px solid var(--storage-border);">
      <div class="mx-auto flex h-full max-w-[800px] items-center justify-between px-6">
        <!-- Logo: JetBrains Mono, 1rem, 600, brand primary -->
        <span style="font-family: var(--font-mono); font-size: 1rem; font-weight: 600; color: var(--storage-primary); white-space: nowrap;">512GB or 1TB</span>
        <!-- Right side: language toggle + GitHub link -->
        <div class="flex items-center gap-4">
          <!-- Language toggle: 中 active / EN inactive -->
          <span class="text-sm whitespace-nowrap">
            <span class="lang-btn" style="color: var(--storage-text-primary); cursor: pointer;">中</span>
            <span style="color: var(--storage-text-tertiary);"> / </span>
            <span class="lang-btn" style="color: var(--storage-text-tertiary); cursor: pointer;">EN</span>
          </span>
          <!-- GitHub link -->
          <a href="#" class="github-link inline-flex items-center gap-1 text-sm whitespace-nowrap" style="color: var(--storage-text-tertiary); text-decoration: none;">
            <i data-lucide="github" style="width: 16px; height: 16px;"></i>
            <span>GitHub</span>
          </a>
        </div>
      </div>
    </header>

    <!-- ===== Hero Section (FULL — S0 landing state) ===== -->
    <section class="mx-auto max-w-[800px] text-center" style="padding: 48px 24px 32px;">
      <h1 style="font-family: var(--font-sans); font-size: 1.5rem; font-weight: 700; color: var(--storage-text-primary); margin: 0 0 8px 0; text-wrap: balance; word-break: keep-all; overflow-wrap: break-word;">
        选择使用场景，估算存储需求，做出购买决策
      </h1>
    </section>

    <!-- ===== Main Content Area (Single Column) ===== -->
    <main class="mx-auto max-w-[800px] px-6" style="padding-bottom: 48px;">
      <div id="main-content" style="min-height: 400px;">
        <!-- SLOT: mainContent — leaf pages inject all content here -->

        <!-- ===== Section Header ===== -->
        <div>
          <h2 style="font-family: var(--font-sans); font-size: 1.25rem; font-weight: 600; color: var(--storage-text-primary); margin: 0 0 8px 0;">你最常做哪种开发？</h2>
          <p style="font-size: 0.75rem; color: var(--storage-text-tertiary); font-style: italic; margin: 0 0 20px 0;">可多选，系统将合并所有场景的配置</p>
        </div>

        <!-- ===== Scenario Cards Grid (3x2 on desktop) ===== -->
        <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-3">
          <!-- Card 1: Web开发 (pre-selected for demo) -->
          <div class="scenario-card scenario-card-selected" role="button" tabindex="0" aria-label="选择场景：Web开发">
            <i data-lucide="code-2" style="width: 24px; height: 24px; color: var(--storage-text-secondary);"></i>
            <h3 style="font-family: var(--font-sans); font-size: 0.875rem; font-weight: 600; color: var(--storage-text-primary); margin: 0;">Web开发</h3>
            <p style="font-size: 0.75rem; color: var(--storage-text-tertiary); line-height: 1.4; margin: 0;">网站、Web应用、后端服务</p>
          </div>
          <!-- Card 2: 移动应用开发 -->
          <div class="scenario-card" role="button" tabindex="0" aria-label="选择场景：移动应用开发">
            <i data-lucide="smartphone" style="width: 24px; height: 24px; color: var(--storage-text-secondary);"></i>
            <h3 style="font-family: var(--font-sans); font-size: 0.875rem; font-weight: 600; color: var(--storage-text-primary); margin: 0;">移动应用开发</h3>
            <p style="font-size: 0.75rem; color: var(--storage-text-tertiary); line-height: 1.4; margin: 0;">iOS / Android 应用</p>
          </div>
          <!-- Card 3: 桌面应用开发 -->
          <div class="scenario-card" role="button" tabindex="0" aria-label="选择场景：桌面应用开发">
            <i data-lucide="monitor" style="width: 24px; height: 24px; color: var(--storage-text-secondary);"></i>
            <h3 style="font-family: var(--font-sans); font-size: 0.875rem; font-weight: 600; color: var(--storage-text-primary); margin: 0;">桌面应用开发</h3>
            <p style="font-size: 0.75rem; color: var(--storage-text-tertiary); line-height: 1.4; margin: 0;">Tauri/Electron 桌面应用</p>
          </div>
          <!-- Card 4: 设计师 -->
          <div class="scenario-card" role="button" tabindex="0" aria-label="选择场景：设计师">
            <i data-lucide="palette" style="width: 24px; height: 24px; color: var(--storage-text-secondary);"></i>
            <h3 style="font-family: var(--font-sans); font-size: 0.875rem; font-weight: 600; color: var(--storage-text-primary); margin: 0;">设计师</h3>
            <p style="font-size: 0.75rem; color: var(--storage-text-tertiary); line-height: 1.4; margin: 0;">UI / 产品设计</p>
          </div>
          <!-- Card 5: 游戏开发 -->
          <div class="scenario-card" role="button" tabindex="0" aria-label="选择场景：游戏开发">
            <i data-lucide="gamepad-2" style="width: 24px; height: 24px; color: var(--storage-text-secondary);"></i>
            <h3 style="font-family: var(--font-sans); font-size: 0.875rem; font-weight: 600; color: var(--storage-text-primary); margin: 0;">游戏开发</h3>
            <p style="font-size: 0.75rem; color: var(--storage-text-tertiary); line-height: 1.4; margin: 0;">Unity / Unreal 游戏</p>
          </div>
          <!-- Card 6: 自媒体运营 -->
          <div class="scenario-card" role="button" tabindex="0" aria-label="选择场景：自媒体运营">
            <i data-lucide="video" style="width: 24px; height: 24px; color: var(--storage-text-secondary);"></i>
            <h3 style="font-family: var(--font-sans); font-size: 0.875rem; font-weight: 600; color: var(--storage-text-primary); margin: 0;">自媒体运营</h3>
            <p style="font-size: 0.75rem; color: var(--storage-text-tertiary); line-height: 1.4; margin: 0;">视频剪辑、设计、AI内容</p>
          </div>
        </div>

        <!-- ===== CTA Button (below grid) ===== -->
        <button data-dom-id="cta-select-scenario" class="cta-estimate-btn cta-estimate-active" type="button">
          开始估算
        </button>
      </div>
    </main>

    <!-- ===== Footer ===== -->
    <footer style="border-top: 1px solid var(--storage-border); padding: 24px; text-align: center;">
      <p class="storage-caption" style="max-width: 800px; margin: 0 auto;">纯本地计算，不收集数据 · 数据更新: 2026-07</p>
    </footer>

    <!-- ===== Google Fonts: Inter + JetBrains Mono ===== -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">

    <!-- ===== Custom Styles (free-explore: placed in body, not head) ===== -->
    <style>
      * { box-sizing: border-box; }
      html { background-color: var(--storage-bg-base); }
      body {
        margin: 0;
        font-family: var(--font-sans);
        font-size: 14px;
        line-height: 1.6;
      }
      /* Language toggle hover feedback */
      .lang-btn { transition: color 0.15s ease; }
      .lang-btn:hover { color: var(--storage-text-secondary); }
      /* GitHub link hover feedback */
      .github-link { transition: color 0.15s ease; }
      .github-link:hover { color: var(--storage-text-secondary); }
      /* Scenario card: interactive entry surface (hover border step + focus ring) */
      .scenario-card {
        display: flex;
        flex-direction: column;
        gap: 8px;
        padding: 20px;
        background-color: var(--storage-bg-elevated);
        border: 1px solid var(--storage-border);
        border-radius: var(--radius-lg);
        cursor: pointer;
        transition: border-color 0.15s ease;
      }
      .scenario-card:hover { border-color: var(--storage-border-hover); }
      .scenario-card:focus-visible { outline: 2px solid var(--storage-primary); outline-offset: 2px; }
      /* Scenario card selected state (blue border + subtle blue tint) */
      .scenario-card-selected {
        border-color: var(--storage-primary, #2563eb);
        background-color: rgba(37, 99, 235, 0.08);
      }
      .scenario-card-selected:hover { border-color: var(--storage-primary, #2563eb); }
      /* CTA estimate button */
      .cta-estimate-btn {
        display: block;
        width: 100%;
        padding: 14px 32px;
        font-family: var(--font-sans);
        font-size: 0.95rem;
        font-weight: 600;
        border-radius: var(--radius-md);
        margin-top: 32px;
        transition: background-color 0.15s ease, color 0.15s ease, border-color 0.15s ease;
      }
      .cta-estimate-active {
        background-color: #2563eb;
        color: var(--storage-text-primary);
        border: none;
        cursor: pointer;
      }
      .cta-estimate-active:hover {
        background-color: var(--storage-primary-hover);
      }
      .cta-estimate-disabled {
        background-color: var(--storage-bg-surface);
        color: var(--storage-text-tertiary);
        cursor: not-allowed;
        border: 1px solid var(--storage-border);
      }
      /* Reduced motion: downgrade all transitions */
      @media (prefers-reduced-motion: reduce) {
        * { transition-duration: 0.01ms !important; }
      }
    </style>

    <!-- ===== Lucide Icons Init ===== -->
    <script>lucide.createIcons();</script>

    <!-- ===== Scenario Card Selection Toggle (vanilla JS) ===== -->
    <script>
      (function() {
        var cards = document.querySelectorAll('.scenario-card');
        var ctaBtn = document.querySelector('[data-dom-id="cta-select-scenario"]');

        function updateCtaState() {
          var anySelected = document.querySelector('.scenario-card-selected') !== null;
          if (anySelected) {
            ctaBtn.classList.add('cta-estimate-active');
            ctaBtn.classList.remove('cta-estimate-disabled');
          } else {
            ctaBtn.classList.remove('cta-estimate-active');
            ctaBtn.classList.add('cta-estimate-disabled');
          }
        }

        cards.forEach(function(card) {
          card.addEventListener('click', function() {
            card.classList.toggle('scenario-card-selected');
            updateCtaState();
          });
          card.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' || e.key === ' ') {
              e.preventDefault();
              card.classList.toggle('scenario-card-selected');
              updateCtaState();
            }
          });
        });
      })();
    </script>
</body>
</html>
